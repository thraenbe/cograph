name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      # Keep version in sync with VSCODE_VERSION in src/test/runTest.ts
      - name: Cache VS Code test binary
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-1.116.0

      - name: Run tests (Linux needs xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: npm test
      - run: npm run package
