<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Pentagon edges -->
  <line x1="12" y1="3.75" x2="19.8" y2="9.45"  stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="19.8" y1="9.45" x2="16.8" y2="18.75" stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16.8" y1="18.75" x2="7.2" y2="18.75" stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7.2" y1="18.75" x2="4.2" y2="9.45"  stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="4.2" y1="9.45"  x2="12" y2="3.75"    stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Inner star diagonals -->
  <line x1="12" y1="3.75"   x2="16.8" y2="18.75" stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="3.75"   x2="7.2"  y2="18.75" stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="19.8" y1="9.45" x2="7.2"  y2="18.75" stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="19.8" y1="9.45" x2="4.2"  y2="9.45"  stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16.8" y1="18.75" x2="4.2" y2="9.45"  stroke="#c5c5c5" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 5 nodes (monochrome) -->
  <circle cx="12"   cy="3.75"  r="2.6" fill="#c5c5c5"/>
  <circle cx="19.8" cy="9.45"  r="2.6" fill="#c5c5c5"/>
  <circle cx="16.8" cy="18.75" r="2.6" fill="#c5c5c5"/>
  <circle cx="7.2"  cy="18.75" r="2.6" fill="#c5c5c5"/>
  <circle cx="4.2"  cy="9.45"  r="2.6" fill="#c5c5c5"/>
</svg>
