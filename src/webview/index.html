<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoGraph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="graph"></div>
  <div id="flow-notice">Dagre layout not available in D3 mode</div>
  <div id="complexity-widget">
    <div class="complexity-header">
      <label for="slider-complexity">Detail</label>
      <span id="val-complexity">1.00</span>
    </div>
    <input type="range" id="slider-complexity" min="0" max="1" step="0.01" value="1" />
  </div>
  <button id="settings-btn" title="Settings">&#9881;</button>
  <div id="settings-panel">

    <div class="panel-section">
      <h4>Layout Mode</h4>
      <div class="layout-toggle">
        <button id="btn-layout-dynamic" class="layout-btn active">&#9889; Dynamic</button>
        <button id="btn-layout-static" class="layout-btn">&#9679; Static</button>
      </div>
    </div>

    <div class="panel-section">
      <h4>Filters</h4>
      <input id="search" type="text" placeholder="Filter functions..." />
      <div class="toggle-row">
        <span>Existing files only</span>
        <label class="switch">
          <input type="checkbox" id="toggle-existing" />
          <span class="pill"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>Show Orphans</span>
        <label class="switch">
          <input type="checkbox" id="toggle-orphans" checked />
          <span class="pill"></span>
        </label>
      </div>
    </div>

    <div class="panel-section">
      <h4>Groups</h4>
      <div class="toggle-row">
        <span>Group by File Structure</span>
        <label class="switch">
          <input type="checkbox" id="toggle-group-file" />
          <span class="pill"></span>
        </label>
      </div>
      <div class="toggle-row stub" title="Coming soon">
        <span>Group by Inheritance</span>
        <label class="switch">
          <input type="checkbox" id="toggle-group-inherit" disabled />
          <span class="pill"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>Group by Flow (L&#8594;R)</span>
        <label class="switch">
          <input type="checkbox" id="toggle-group-flow" />
          <span class="pill"></span>
        </label>
      </div>
      <button id="btn-new-group" disabled>+ Create new Group</button>
    </div>

    <div class="panel-section">
      <h4>Display</h4>
      <div class="toggle-row">
        <span>Arrows</span>
        <label class="switch">
          <input type="checkbox" id="toggle-arrows" checked />
          <span class="pill"></span>
        </label>
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-text-fade">Text Fade Threshold</label>
          <span id="val-text-fade">0.5</span>
        </div>
        <input type="range" id="slider-text-fade" min="0" max="2" step="0.1" value="0.5" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-node-size">Node Size</label>
          <span id="val-node-size">2.5</span>
        </div>
        <input type="range" id="slider-node-size" min="0.5" max="3" step="0.1" value="2.5" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-link-thickness">Link Thickness</label>
          <span id="val-link-thickness">4</span>
        </div>
        <input type="range" id="slider-link-thickness" min="0.1" max="8" step="0.1" value="4" />
      </div>
    </div>

    <div class="panel-section" id="forces-section">
      <h4>Forces</h4>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-center-force">Center Force</label>
          <span id="val-center-force">1</span>
        </div>
        <input type="range" id="slider-center-force" min="0" max="5" step="0.05" value="1" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-repel-force">Repel Force</label>
          <span id="val-repel-force">500</span>
        </div>
        <input type="range" id="slider-repel-force" min="0" max="8192" step="50" value="500" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-link-force">Link Force</label>
          <span id="val-link-force">1</span>
        </div>
        <input type="range" id="slider-link-force" min="0.1" max="2" step="0.1" value="1" />
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <label for="slider-link-distance">Link Distance</label>
          <span id="val-link-distance">60</span>
        </div>
        <input type="range" id="slider-link-distance" min="10" max="80" step="5" value="40" />
      </div>
    </div>

  </div>
  <script src="clustering.js"></script>
  <script src="rendering.js"></script>
  <script src="main.js"></script>
  <script src="controls.js"></script>
</body>
</html>
